<!DOCTYPE html>
<html lang="en">
<head>
    <!--「/warashi-server-official-website/templates/」を icon, stylesheet, fetchの前に記述すべし。-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わらし鯖</title>
    <link rel="icon" href="./templates/icon.png">
    <link rel="stylesheet" href="./templates/menu.css">
    <style>
        body {
            /*画像が切れたら、新たな画像を追加するべし。*/
            background-color: rgb(255, 250, 250);
            background-image: url(backimage.png);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 1000px;
        }

        #menu {
            position: sticky;
            top: 0;
        }

        .main-content {
            margin-top: 100px;
            text-align: center;          
        }

        .main-content h1, h2, h3, h4 {
            color: #ffccdd;
        }

        .main-content p {
            color: #77ff90;
        }

        .main-content .important {
            color: red;
        }

        .welcome-message {
            animation: fade-in 3s;
            animation-fill-mode: forwards;
        }

        .explain-text {
            animation: right-to-left 3s;
            animation-fill-mode: forwards;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes right-to-left {
            from {
                transform: translateX(1000px);
            }

            to {
                transform: translateX(0px);
            }
        }

        .button {
            display: inline-block;
            background-color: #ffccdd;
            color: #7e3d00;
            margin-top: 40px;
            padding: 16px 16px;
            border-radius: 30px;
            text-decoration: none;
            transition: color 0.5s ease;
            animation: fade-in 3s;
            animation-fill-mode: forwards;
        }

        .button:hover {
            color: green;
        }

    </style>
</head>
<body>
    <div id="menu"></div>
    <div class="main-content">
        <h1 class="welcome-message" style="font-size: 70px;">わらし鯖へようこそ！</h1>
        <br>
        <p class="explain-text">わらしとみんなで作り上げるマイクラコミュニティ<br>サバイバルからベッドウォーズをはじめとした各種ミニゲームまで</p>
        <a class="button" href="">参加する→</a>
    </div>
    <script>
        async function loadmanu() {
            try {
                const response = await fetch("./templates/menu.html");
                const data = await response.text();
                document.getElementById("menu").innerHTML = data;
            } catch(error) {
                console.error("エラー:", error);
            }
        }

        loadmanu()
    </script>
</body>
</html>
